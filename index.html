<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Park - Mustache Edition</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/ojos.css" />
    <link rel="stylesheet" href="css/bigote.css" />
    <link rel="stylesheet" href="css/cuerpos.css" />
    <link rel="stylesheet" href="css/cabezas.css" />
    <link rel="stylesheet" href="css/cierres_bolsillos.css">
    <link rel="stylesheet" href="css/fondo.css">
  </head>
  <body>
    <div class="escena">
  
    <div class="south-park-bg">

        <div class="letrero">
        <div class="senal">
          <img src="img/zona-escolar.png" alt="Zona Escolar" />
        </div>
        
        <div class="poste"></div>
      </div>

    <div class="contenedor-principal">
      <div class="personaje">
        <div class="face stan">
          <div class="ojo izquierdo"></div>
          <div class="ojo derecho"></div>
          <div class="mustache-scaler"><div class="mustache"></div></div>
        </div>
        <div class="torso stan-cuerpo">
          <div class="brazo izquierdo"></div>
          <div class="brazo derecho"></div>
        </div>
        <div class="poste"></div>
      </div>

      <div class="contenedor-principal">
        <!-- STAN -->
        <div class="personaje">
          <div class="face stan">
            <div class="ojo izquierdo"></div>
            <div class="ojo derecho"></div>
            <div class="mustache-scaler"><div class="mustache"></div></div>
          </div>
          <div class="torso stan-cuerpo">
            <div class="brazo izquierdo"></div>
            <div class="brazo derecho"></div>
          </div>
        </div>

        <!-- KYLE -->
        <div class="personaje">
          <div class="face kyle">
            <div class="ojo izquierdo"></div>
            <div class="ojo derecho"></div>
            <div class="mustache-scaler"><div class="mustache"></div></div>
          </div>
          <div class="torso kyle-cuerpo">
            <div class="brazo izquierdo"></div>
            <div class="brazo derecho"></div>
          </div>
        </div>

        <!-- CARTMAN -->
        <div class="personaje">
          <div class="face cartman">
            <div class="ojo izquierdo"></div>
            <div class="ojo derecho"></div>
            <div class="mustache-scaler"><div class="mustache"></div></div>
          </div>
          <div class="torso cartman-cuerpo">
            <div class="brazo izquierdo"></div>
            <div class="brazo derecho"></div>
          </div>
        </div>

      <div class="personaje">
        <div class="kenny">
          <div class="piernas"></div>
          <div class="cuerpo"></div>
          <div class="brazos"></div>
          <div class="capucha">
            <div class="capuchainterna">
              <div class="cara-piel">
                <div class="ojo izquierdo"></div>
                <div class="ojo derecho"></div>
              </div>
              <div class="mustache-scaler"><div class="mustache"></div></div>
            </div>
            <div class="strings"></div>
          </div>
          </div>
        </div>
      </div>
    </div>

        <div class="sky"></div>

        <!-- Copos de nieve -->
        <div class="snowflakes" id="snowflakes"></div>

        <div class="trees">
            <!-- Árbol grande izquierda -->
            <div class="xmas-tree tree-lg">
                <div class="star">★</div>
                <div class="layer layer-1"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-2"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-3"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="trunk"></div>
            </div>

            <!-- Árbol pequeño -->
            <div class="xmas-tree tree-sm">
                <div class="star">★</div>
                <div class="layer layer-1"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-2"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-3"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="trunk"></div>
            </div>

            <!-- Árbol mediano centro -->
            <div class="xmas-tree tree-md">
                <div class="star">★</div>
                <div class="layer layer-1"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-2"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-3"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="trunk"></div>
            </div>

            <!-- Árbol pequeño derecha -->
            <div class="xmas-tree tree-sm">
                <div class="star">★</div>
                <div class="layer layer-1"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-2"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-3"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="trunk"></div>
            </div>

            <!-- Árbol grande derecha -->
            <div class="xmas-tree tree-lg">
                <div class="star">★</div>
                <div class="layer layer-1"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-2"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="layer layer-3"><div class="green"></div><div class="snow-cap"></div></div>
                <div class="trunk"></div>
            </div>
        </div>

        <div class="snow-ground"></div>
    </div>

    <script>
        // Generar copos de nieve
        const container = document.getElementById('snowflakes');
        for (let i = 0; i < 40; i++) {
            const flake = document.createElement('div');
            flake.className = 'snowflake';
            flake.textContent = '❄';
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.animationDuration = (4 + Math.random() * 8) + 's';
            flake.style.animationDelay = (Math.random() * 10) + 's';
            flake.style.fontSize = (0.5 + Math.random() * 1.2) + 'em';
            flake.style.opacity = 0.4 + Math.random() * 0.6;
            container.appendChild(flake);
        }
    </script>

    
  </body>
</html>
