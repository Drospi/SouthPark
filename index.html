<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>South Park</title>
    <link rel="stylesheet" href="css/cabezas.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/ojos.css" />
    <link rel="stylesheet" href="css/bigote.css"/>
    <link rel="stylesheet" href="css/Cuerpos.css">
  </head>

  <body>
    <div class="letrero">
      <div class="senal">
        <img src="img/zona-escolar.png" alt="Zona Escolar" />
      </div>
      <div class="poste"></div>
    </div>

    <div class="contenedor-principal">
      <div class="face stan">
        <div class="ojo izquierdo"></div>
        <div class="ojo derecho"></div>
        <div class="mustache-scaler">
          <div class="mustache"></div>
        </div>
      </div>
      <div class="face kyle">
        <div class="ojo izquierdo"></div>
        <div class="ojo derecho"></div>
        <div class="mustache-scaler">
          <div class="mustache"></div>
        </div>
      </div>
      <div class="face cartman">
        <div class="ojo izquierdo"></div>
        <div class="ojo derecho"></div>
        <div class="mustache-scaler">
          <div class="mustache"></div>
        </div>
      </div>
      <div class="kenny">
        <div class="piernas"></div>
        <div class="cuerpo"></div>
        <div class="brazos"></div>
        <div class="capucha">
          <div class="capuchainterna">
            <div class="cara-piel">
              <div class="ojo izquierdo"></div>
              <div class="ojo derecho"></div>
              </div>
              <div class="mustache-scaler">
                <div class="mustache"></div>
            </div>
          </div>
          <div class="strings"></div>
        </div>
      </div>
    </div>
